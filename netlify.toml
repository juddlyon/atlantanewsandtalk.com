[build]
  command = "echo 'Build locally, deploy with: netlify deploy --prod'"
  publish = "dist"
  ignore = "exit 0"

# Functions disabled until build minutes reset (April 2026)
# [functions]
#   directory = "netlify/functions"

[build.processing.html]
  pretty_urls = true

# Force trailing slashes (fixes URL cannibalization in Google)
[[redirects]]
  from = "/*"
  to = "/:splat/"
  status = 301
  force = false
  conditions = {Path = ["/:path"], PathNegate = ["/:path/"]}

# Explicit trailing slash redirects for pages showing cannibalization
[[redirects]]
  from = "/buckhead-atlanta-news"
  to = "/buckhead-atlanta-news/"
  status = 301

[[redirects]]
  from = "/trinity-center-flats-groundbreaking"
  to = "/trinity-center-flats-groundbreaking/"
  status = 301

# Redirect East Atlanta Village to East Atlanta (merged)
[[redirects]]
  from = "/neighborhoods/east-atlanta-village/*"
  to = "/neighborhoods/east-atlanta/"
  status = 301
  force = true

# Redirects for removed neighborhoods (consolidated April 2026)

